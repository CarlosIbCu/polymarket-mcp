runtime: "container"
startCommand:
  type: "http"
  # No configuration required for public Polymarket endpoints
  configSchema:
    type: "object"
    properties:
      server:
        type: "object"
        properties:
          host:
            type: "string"
            description: "Server host"
            default: "0.0.0.0"
          port:
            type: "integer"
            description: "Server port"
            default: 3333
    additionalProperties: false
  exampleConfig:
    server:
      host: "0.0.0.0"
      port: 3333
build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "." 